  <style>
    /* ---------- GLOBAL & VARIÁVEIS ---------- */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-dark: #1C1C1C;
      --purple-dark: #5E2D8A;
      --purple-med: #7B4B9E;
      --red-secret: #E63946;
      --gray-draft: #4A4A4A;
      --font-mono: 'Courier New', Courier, monospace;
      --font-type: 'Special Elite', 'Courier New', monospace;
      --border-rough: 3px dashed var(--gray-draft);
    }
    body {
      background: linear-gradient(145deg, var(--bg-dark), #2a1a3a);
      font-family: var(--font-mono);
      color: #e0e0e0;
      min-height: 100vh;
      padding: 12px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .app-container {
      width: 100%;
      max-width: 1400px;
      height: 95vh;
      display: flex;
      flex-direction: column;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(2px);
      border: var(--border-rough);
      border-radius: 32px;
      padding: 16px;
      box-shadow: 0 0 20px var(--purple-dark);
    }
    /* grid 4 quadrados */
    .grid-4 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 16px;
      flex: 1;
      min-height: 0;
    }
    .quadrant {
      background: rgba(30, 30, 40, 0.7);
      border: 2px dashed var(--purple-med);
      border-radius: 24px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      backdrop-filter: blur(4px);
      box-shadow: inset 0 0 20px rgba(123, 75, 158, 0.2);
    }
    .quadrant h3 {
      font-family: var(--font-type);
      color: var(--red-secret);
      font-size: 1rem;
      letter-spacing: 2px;
      border-bottom: 1px dashed var(--purple-med);
      padding-bottom: 6px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .scroll-area {
      overflow-y: auto;
      flex: 1;
      scrollbar-width: thin;
      scrollbar-color: var(--purple-med) var(--bg-dark);
    }
    .scroll-area::-webkit-scrollbar { width: 6px; }
    .scroll-area::-webkit-scrollbar-track { background: var(--bg-dark); }
    .scroll-area::-webkit-scrollbar-thumb { background: var(--purple-med); border-radius: 20px; }

    .borda-rascunho {
      border: var(--border-rough);
      border-radius: 20px;
      padding: 8px;
      background: linear-gradient(45deg, transparent 30%, var(--purple-dark) 50%);
      background-size: 200% 200%;
    }

    /* logo */
    .logo-area {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 2rem;
      font-weight: bold;
    }
    .logo-xxx { color: var(--red-secret); }
    .logo-iu { 
      background: linear-gradient(135deg, #7B2D9E, #5E2D8A);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 6px #b200ff);
    }
    .dedo {
      font-size: 2.5rem;
      filter: drop-shadow(0 0 5px var(--red-secret));
      animation: fadein 2s;
    }

    /* inputs e botões */
    .input-rough {
      background: transparent;
      border: 2px dashed var(--gray-draft);
      border-radius: 40px;
      padding: 12px 16px;
      color: white;
      font-family: var(--font-mono);
      outline: none;
      transition: 0.2s;

    .input-rough:focus { border-color: var(--purple-med); box-shadow: 0 0 15px #7B2D9E; }
    .btn-glow {
      background: transparent;
      border: 2px solid var(--purple-dark);
      border-radius: 40px;
      padding: 12px;
      font-weight: bold;
      color: white;
      cursor: pointer;
      transition: 0.2s;
      font-family: var(--font-mono);
    }
    .btn-glow:hover { background: var(--purple-dark); box-shadow: 0 0 20px #9a4dff; border-style: dashed; }

    /* mensagens */
    .message-bubble {
      background: rgba(94, 45, 138, 0.2);
      border-left: 4px solid var(--red-secret);
      padding: 8px 12px;
      margin: 8px 0;
      border-radius: 12px 12px 12px 0;
      font-family: var(--font-mono);
      word-break: break-word;
    }
    .msg-info { font-size: 0.7rem; color: #aaa; display: flex; gap: 10px; }
    .msg-text { color: #ddd; }
    .img-thumb {
      max-width: 100%;
      max-height: 120px;
      border: var(--border-rough);
      border-radius: 16px;
      margin: 4px 0;
    }
    .video-thumb {
      max-height: 100px;
      border: 3px dashed var(--purple-med);
      border-radius: 20px;
    }

    /* barra progresso gamificação */
    .progress-row {
      width: 100%;
      height: 8px;
      background: #2a2a3a;
      border-radius: 20px;
      margin: 8px 0;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--purple-dark), var(--red-secret));
      border-radius: 20px;
      transition: width 0.3s;
    }

    /* narrativa typewriter */
    .typewriter-box {
      background: #111118;
      border-radius: 16px;
      padding: 10px;
      font-family: var(--font-type);
      font-size: 0.9rem;
      line-height: 1.5;
      white-space: pre-wrap;
      border: 1px dashed var(--purple-dark);
      flex: 1;
      overflow-y: auto;
      margin-bottom: 8px;
    }
    .typewriter-cursor {
      display: inline-block;
      width: 8px;
      background: var(--red-secret);
      animation: blink 1s infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }
    @keyframes fadein { 0% { opacity: 0; } 100% { opacity: 1; } }
    @keyframes dissolve {
      0% { opacity: 1; transform: scale(1); filter: blur(0); }
      100% { opacity: 0; transform: scale(0.2); filter: blur(10px); }
    }
    .dissolve { animation: dissolve 0.8s forwards; }

    /* pop-up inteligente (geral) e fofoca */
    .popup-inteligente, .popup-fofoca {
      position: fixed;
      top: 20%;
      right: 20px;
      z-index: 1000;
      background: rgba(28, 28, 28, 0.9);
      backdrop-filter: blur(15px);
      border: 2px solid;
      border-image: repeating-linear-gradient(45deg, var(--purple-med), var(--red-secret)) 30;
      padding: 20px;
      border-radius: 16px;
      animation: popupSlideIn 0.5s ease-out, fadeOut 5s 3s forwards;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      max-width: 280px;
      color: white;
      font-family: var(--font-type);
    }
    .popup-fofoca {
      border-image: repeating-linear-gradient(45deg, #FFB347, #E63946) 30;
    }
    @keyframes popupSlideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes fadeOut {
      to { opacity: 0; transform: translateX(20px); }
    }

    /* modo indicator */
    .modo-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9rem;
      background: rgba(0,0,0,0.5);
      padding: 6px 12px;
      border-radius: 40px;
      border: 1px dashed var(--purple-med);

    .modo-badge {
      background: var(--purple-med);
      color: white;
      padding: 4px 12px;
      border-radius: 20px;
      font-weight: bold;
      text-transform: uppercase;
    }

    /* responsivo mobile */
    @media (max-width: 700px) {
      .grid-4 { grid-template-columns: 1fr; grid-template-rows: auto auto auto auto; }
    }
  </style>

<script>
  // ------------------------------------------------------------------
  // CONFIG FIREBASE (SUBSTITUA PELAS SUAS CREDENCIAIS)
  // ------------------------------------------------------------------
  const firebaseConfig = {
    apiKey: "AIzaSyA_xxxxxxxxxxxxx",      // <-- SUBSTITUA
    authDomain: "xxx-iu.firebaseapp.com",  // <-- SUBSTITUA
    databaseURL: "https://xxx-iu-default-rtdb.firebaseio.com", // <-- SUBSTITUA
    projectId: "xxx-iu",
    storageBucket: "xxx-iu.appspot.com",
    messagingSenderId: "1234567890",
    appId: "1:1234567890:web:abc123def"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.database();

  // ------------------------------------------------------------------
  // MODOS HISTÓRIA
  // ------------------------------------------------------------------
  const BASE_MODES = ['ROMANCE', 'NOIR', 'FANTASIA'];
  const DYNAMIC_MODES = ['GÓTICO', 'COMÉDIA', 'ERÓTICO', 'FICÇÃO CIENTÍFICA', 'DRAMA'];
  const ALL_MODES = [...BASE_MODES, ...DYNAMIC_MODES];

  // ------------------------------------------------------------------
  // ESTADO GLOBAL
  // ------------------------------------------------------------------
  let currentUser = null;
  let currentUserNick = '';
  let currentRoomId = null;
  let roomKeyCache = new Map();
  let points = 0;
  const narrativePaused = { value: false };
  let lastMessageTime = Date.now();
  let popupInterval = null;
  let invitedPersonNick = '';
  let currentMode = 'ROMANCE';          // sincronizado via room metadata
  let modeListener = null;

  // IndexedDB para chaves ECDH (privadas permanecem no cliente)
  const idb = (() => {
    const dbName = 'xxx_keystore';
    let dbInstance;
    async function open() {
      if (dbInstance) return dbInstance;
      return new Promise((res, rej) => {
        const req = indexedDB.open(dbName, 1);
        req.onupgradeneeded = e => e.target.result.createObjectStore('ecdh_private', { keyPath: 'uid' });
        req.onsuccess = e => { dbInstance = e.target.result; res(dbInstance); };
        req.onerror = rej;
      });
    }
    return {
      async setPrivateKey(uid, keyJWK) {
        const db = await open();
        const tx = db.transaction('ecdh_private', 'readwrite');
        tx.objectStore('ecdh_private').put({ uid, key: JSON.stringify(keyJWK) });
        return tx.complete;
      },
      async getPrivateKey(uid) {
        const db = await open();
        return new Promise((res, rej) => {
          const tx = db.transaction('ecdh_private', 'readonly');
          const req = tx.objectStore('ecdh_private').get(uid);
          req.onsuccess = () => res(req.result ? JSON.parse(req.result.key) : null);
          req.onerror = rej;
        });
      }
    };
  })();

  // ------------------------------------------------------------------
  // CRIPTO E2EE (ECDH + AES-GCM) - mantida igual
  // ------------------------------------------------------------------
  async function generateUserKeys(uid) {
    const keyPair = await crypto.subtle.generateKey(
      { name: 'ECDH', namedCurve: 'P-256' },
      true,
      ['deriveKey', 'deriveBits']
    );
    const privateJwk = await crypto.subtle.exportKey('jwk', keyPair.privateKey);
    await idb.setPrivateKey(uid, privateJwk);

    const publicJwk = await crypto.subtle.exportKey('jwk', keyPair.publicKey);
    return {
      x: publicJwk.x,
      y: publicJwk.y,
      crv: publicJwk.crv,
      kty: publicJwk.kty
    };
  }

  async function getSharedKey(uid, otherUid, otherPublicJwk) {
    const cacheKey = [uid, otherUid].sort().join('|');
    if (roomKeyCache.has(cacheKey)) return roomKeyCache.get(cacheKey);

    const privateJwk = await idb.getPrivateKey(uid);
    if (!privateJwk) throw new Error('chave privada não encontrada');

    const privateKey = await crypto.subtle.importKey(
      'jwk', privateJwk,
      { name: 'ECDH', namedCurve: 'P-256' },
      false, ['deriveKey']
    );

    const publicKey = await crypto.subtle.importKey(
      'jwk', { ...otherPublicJwk, key_ops: [] },
      { name: 'ECDH', namedCurve: 'P-256' },
      false, []
    );

    const aesKey = await crypto.subtle.deriveKey(
      { name: 'ECDH', public: publicKey },
      privateKey,
      { name: 'AES-GCM', length: 256 },
      true,
      ['encrypt', 'decrypt']
    );
    roomKeyCache.set(cacheKey, aesKey);
    return aesKey;
  }

  async function encryptMessage(roomId, plainObj, otherUid, myUid, otherPublic) {
    const key = await getSharedKey(myUid, otherUid, otherPublic);
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const encoded = new TextEncoder().encode(JSON.stringify(plainObj));
    const ciphertext = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, encoded);
    return {
      iv: btoa(String.fromCharCode(...iv)),
      data: btoa(String.fromCharCode(...new Uint8Array(ciphertext)))
    };
  }

  async function decryptMessage(encryptedMsg, myUid, otherUid, otherPublic) {
    const key = await getSharedKey(myUid, otherUid, otherPublic);
    const iv = new Uint8Array(atob(encryptedMsg.iv).split('').map(c => c.charCodeAt(0)));
    const data = new Uint8Array(atob(encryptedMsg.data).split('').map(c => c.charCodeAt(0)));
    const decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, data);
    return JSON.parse(new TextDecoder().decode(decrypted));
  }

  // ------------------------------------------------------------------
  // LOGIN CRIADOR (sigilo / sig69)
  // ------------------------------------------------------------------
  function showLogin() {
    const splash = document.getElementById('splashContent');
    splash.innerHTML = `
      <div style="padding:8px; background:#2a1a3a; border-radius: 16px; margin-bottom:12px;">
        <span style="color:var(--red-secret)">🔐 Acesso criador</span>
      </div>
      <input type="text" id="loginUser" class="input-rough" placeholder="usuário" value="sigilo">
      <input type="password" id="loginPass" class="input-rough" placeholder="senha" value="sig69">
      <button class="btn-glow" id="btnLogin">🔌 ENTRAR COMO CRIADOR</button>
    `;
    document.getElementById('btnLogin').onclick = async () => {
      const user = document.getElementById('loginUser').value;
      const pass = document.getElementById('loginPass').value;
      if (user === 'sigilo' && pass === 'sig69') {
        try {
          let fbUser = auth.currentUser;
          if (!fbUser) fbUser = (await auth.signInAnonymously()).user;
          await fbUser.updateProfile({ displayName: 'sigilo' });
          currentUser = fbUser;
          currentUserNick = 'sigilo';
          const snap = await db.ref(`users/${fbUser.uid}/publicKey`).once('value');
          if (!snap.exists()) {
            const publicKey = await generateUserKeys(fbUser.uid);
            await db.ref(`users/${fbUser.uid}`).set({
              nick: 'sigilo', publicKey, status: 'online', points: 0, lastSeen: Date.now()
            });
          } else {
            await db.ref(`users/${fbUser.uid}/status`).set('online');
          }
          db.ref('.info/connected').on('value', (snap) => {
            if (snap.val() === true) {
              const pres = db.ref(`users/${fbUser.uid}`);
              pres.onDisconnect().update({ status: 'offline', lastSeen: Date.now() });
              pres.update({ status: 'online' });
            }
          });
          updateUILoggedIn();
          adicionarNarrativaLiteraria('🕵️ Criador sigilo entrou na sala', 'system');
          renderPersonagemForm();
        } catch (e) { alert('Erro: ' + e.message); }
      } else {
        alert('Credenciais inválidas. Use sigilo / sig69');
      }
    };
  }

  function updateUILoggedIn() {
    document.getElementById('splashContent').innerHTML = `
      <div style="padding:8px; background:#2a1a3a; border-radius: 16px;">
        <span style="color:var(--red-secret)">⚡ CRIADOR: sigilo</span><br>
        <small>UID: ${currentUser.uid.slice(0,6)}</small>
      </div>
    `;
  }

  // ------------------------------------------------------------------
  // FORMULÁRIO ADICIONAR PERSONAGEM (com seletor de modo base)
  // ------------------------------------------------------------------
  function renderPersonagemForm() {
    const container = document.getElementById('personagemContainer');
    container.innerHTML = `
      <div class="add-personagem" style="display: flex; flex-direction: column; gap: 12px;">
        <h3 style="color:var(--purple-med);">➕ ADICIONAR PERSONAGEM</h3>
        <input type="text" id="nickPersonagem" class="input-rough" placeholder="Nick do personagem (ex: MysteryGirl)">
        <input type="text" id="whatsappPersonagem" class="input-rough" placeholder="WhatsApp (55XX...)" value="5511999999999">
        <label style="color:var(--purple-med);">Modo base da história:</label>
        <select id="modoBaseSelect" class="input-rough">
          ${BASE_MODES.map(m => `<option value="${m}">${m}</option>`).join('')}
        </select>
        <button class="btn-glow" id="gerarConviteBtn">🎭 CRIAR LINK SECRETO E ENVIAR</button>
        <div id="conviteStatus"></div>
      </div>
    `;
    document.getElementById('gerarConviteBtn').onclick = gerarConvite;
  }

  async function gerarConvite() {
    const nick = document.getElementById('nickPersonagem').value.trim();
    const whatsapp = document.getElementById('whatsappPersonagem').value.trim();
    const modoBase = document.getElementById('modoBaseSelect').value;
    if (!nick || !whatsapp) return alert('Preencha nick e WhatsApp');

    const roomId = 'xxziu_' + Date.now() + '_' + Math.random().toString(36).substring(2, 8);
    invitedPersonNick = nick;

    await db.ref(`rooms/${roomId}/metadata`).set({
      criadorUid: currentUser.uid,
      criadorNick: 'sigilo',
      personagemNick: nick,
      status: 'aguardando',
      criado: Date.now(),
      currentMode: modoBase,
      lastModeChange: Date.now()
    });

    const link = `https://${window.location.host}/?room=${roomId}&nick=${encodeURIComponent(nick)}`;
    const msgWhatsApp = `🤫 ${nick} foi convidado para o XXXIU! (modo ${modoBase})\n\n${link}\n\nAcesse agora para nossa história secreta!`;

    window.open(`https://wa.me/${whatsapp}?text=${encodeURIComponent(msgWhatsApp)}`);

    document.getElementById('conviteStatus').innerHTML = `<small style="color:lightgreen;">✅ Link gerado e enviado! Aguardando ${nick}...</small>`;

    aguardarPersonagem(roomId, nick);
  }

  function aguardarPersonagem(roomId, personagemNick) {
    const roomRef = db.ref(`rooms/${roomId}/metadata`);
    roomRef.on('value', async (snap) => {
      const data = snap.val();
      if (data && data.status === 'conectado') {
        document.getElementById('personagemContainer').innerHTML = `
          <div style="background:#2a1a3a; padding:16px; border-radius: 16px;">
            <span class="status-online">●</span> ${personagemNick} online<br>
            <small>Uid: ${data.personagemUid}</small>
          </div>
        `;
        iniciarChatComPersonagem(roomId, data.personagemUid, personagemNick);
        roomRef.off();
      }
    });
  }

  async function iniciarChatComPersonagem(roomId, otherUid, otherNick) {
    currentRoomId = roomId;
    document.getElementById('chatDestinatario').innerText = `🤫 ${otherNick}`;
    const myUid = currentUser.uid;

    // Obter chave pública do outro
    const snapPub = await db.ref(`users/${otherUid}/publicKey`).once('value');
    const otherPublic = snapPub.val();
    if (!otherPublic) return alert('personagem sem chave pública');

    await getSharedKey(myUid, otherUid, otherPublic);

    // Ouvir mensagens
    const msgsRef = db.ref(`rooms/${roomId}/messages`).orderByChild('timestamp');
    msgsRef.off();
    msgsRef.on('child_added', async (snapMsg) => {
      const msg = snapMsg.val();
      if (!msg || msg.sender === myUid) return;
      try {
        const decrypted = await decryptMessage({ iv: msg.iv, data: msg.cipher }, myUid, msg.sender, otherPublic);
        displayMessage(decrypted, msg.sender, msg.timestamp, otherNick);
        // Gera narrativa literária baseada no modo atual
        const linha = gerarNarrativaLiteraria(decrypted, otherNick, currentMode);
        adicionarNarrativaLiteraria(linha, 'msg');
        lastMessageTime = Date.now();
      } catch (e) { console.warn('falha decrypt', e); }
    });

    // Ouvir mudanças de modo
    if (modeListener) modeListener.off();
    modeListener = db.ref(`rooms/${roomId}/metadata/currentMode`).on('value', (snap) => {
      const novoModo = snap.val();
      if (novoModo && novoModo !== currentMode) {
        currentMode = novoModo;
        document.getElementById('modoAtualDisplay').innerText = currentMode;
        adicionarNarrativaLiteraria(`🎭 Modo alterado para: ${currentMode}`, 'system');
      }
    });

    // Carregar modo atual
    const metaSnap = await db.ref(`rooms/${roomId}/metadata`).once('value');
    const meta = metaSnap.val();
    if (meta && meta.currentMode) {
      currentMode = meta.currentMode;
      document.getElementById('modoAtualDisplay').innerText = currentMode;
    }

    document.getElementById('messageContainer').innerHTML = '';
    iniciarMonitorInatividade();
    iniciarRotacaoAutomatica(roomId);
  }

  // ------------------------------------------------------------------
  // LÓGICA DO CONVIDADO (acessar via link)
  // ------------------------------------------------------------------
  async function handleInvitedLink() {
    const urlParams = new URLSearchParams(window.location.search);
    const roomId = urlParams.get('room');
    const invitedNick = urlParams.get('nick');
    if (!roomId || !invitedNick) return;

    let fbUser = auth.currentUser;
    if (!fbUser) fbUser = (await auth.signInAnonymously()).user;
    await fbUser.updateProfile({ displayName: invitedNick });
    currentUser = fbUser;
    currentUserNick = invitedNick;

    const snapKey = await db.ref(`users/${fbUser.uid}/publicKey`).once('value');
    if (!snapKey.exists()) {
      const publicKey = await generateUserKeys(fbUser.uid);
      await db.ref(`users/${fbUser.uid}`).set({
        nick: invitedNick, publicKey, status: 'online', points: 0, lastSeen: Date.now()
      });
    } else {
      await db.ref(`users/${fbUser.uid}/status`).set('online');
    }

    await db.ref(`rooms/${roomId}/metadata`).update({
      status: 'conectado',
      personagemUid: fbUser.uid,
      personagemNick: invitedNick
    });

    document.getElementById('quadSplash').innerHTML = `
      <h3>🤫 NÃO CONTA PRA NINGUÉM</h3>
      <div class="logo-area"><span class="dedo">🤫</span><span class="logo-xxx">XXX</span><span class="logo-iu">IU!</span></div>
      <div style="padding:8px; background:#2a1a3a; border-radius:16px;"><span style="color:var(--red-secret)">👤 Personagem: ${invitedNick}</span></div>
    `;

    const metaSnap = await db.ref(`rooms/${roomId}/metadata`).once('value');
    const meta = metaSnap.val();
    if (meta && meta.criadorUid) {
      iniciarChatComPersonagem(roomId, meta.criadorUid, 'sigilo');
    }
  }

  // ------------------------------------------------------------------
  // FUNÇÕES DE CHAT
  // ------------------------------------------------------------------
  function displayMessage(obj, senderUid, ts, senderNick) {
    const container = document.getElementById('messageContainer');
    const div = document.createElement('div');
    div.className = 'message-bubble';
    const time = new Date(ts).toLocaleTimeString('pt', { hour: '2-digit', minute: '2-digit' });
    let extra = '';
    if (obj.tipo === 'img') extra = `<img src="${obj.url}" class="img-thumb" alt="img">`;
    if (obj.tipo === 'vid') extra = `<video src="${obj.url}" autoplay loop muted class="video-thumb"></video>`;
    div.innerHTML = `
      <div class="msg-info"><span>${senderNick}</span> ${time} ✓✓</div>
      <div class="msg-text">${obj.text || ''}</div>
      ${extra}
    `;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  async function sendMessage() {
    const input = document.getElementById('msgInput');
    const raw = input.value.trim();
    if (!raw || !currentRoomId || !currentUser) return;
    const metaSnap = await db.ref(`rooms/${currentRoomId}/metadata`).once('value');
    const meta = metaSnap.val();
    if (!meta) return;
    const otherUid = meta.criadorUid === currentUser.uid ? meta.personagemUid : meta.criadorUid;
    const otherNick = otherUid === meta.criadorUid ? meta.criadorNick : meta.personagemNick;

    let tipo = 'texto';
    let text = raw;
    let url = '';
    if (raw.startsWith('/img ')) { tipo = 'img'; url = raw.substring(5); text = '📷 imagem'; }
    else if (raw.startsWith('/vid ')) { tipo = 'vid'; url = raw.substring(5); text = '🎬 vídeo'; }

    const msgObj = { tipo, text, url, timestamp: Date.now() };
    const snapOther = await db.ref(`users/${otherUid}/publicKey`).once('value');
    const otherPublic = snapOther.val();

    const encrypted = await encryptMessage(currentRoomId, msgObj, otherUid, currentUser.uid, otherPublic);
    await db.ref(`rooms/${currentRoomId}/messages`).push({
      sender: currentUser.uid,
      timestamp: Date.now(),
      iv: encrypted.iv,
      cipher: encrypted.data
    });

    displayMessage(msgObj, currentUser.uid, Date.now(), currentUserNick);
    // Narrativa para própria mensagem (parafraseada)
    const linha = gerarNarrativaLiteraria(msgObj, currentUserNick, currentMode);
    adicionarNarrativaLiteraria(linha, 'msg');
    input.value = '';
    lastMessageTime = Date.now();

    points += 1;
    if (tipo === 'img') points += 2;
    if (tipo === 'vid') points += 4;
    document.getElementById('progressGamification').style.width = Math.min(points, 100) + '%';
  }

  document.getElementById('btnEnviar').onclick = sendMessage;
  document.getElementById('msgInput').onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };
  document.getElementById('btnUpload').onclick = () => {
    document.getElementById('msgInput').value = '/img https://i.imgur.com/n9b9Upa.jpeg';
  };

  document.getElementById('btnAutodestruir').onclick = async () => {
    if (!currentRoomId || !confirm('🔥 AUTODESTRUIR TODAS MSGS? Narrativa será preservada.')) return;
    const msgsDiv = document.getElementById('messageContainer');
    Array.from(msgsDiv.children).forEach(el => el.classList.add('dissolve'));
    await new Promise(r => setTimeout(r, 800));
    await db.ref(`rooms/${currentRoomId}/messages`).remove();
    msgsDiv.innerHTML = '';
    adicionarNarrativaLiteraria('💥 MENSAGENS DISSOLVIDAS. A história permanece.', 'system');
  };

  // ------------------------------------------------------------------
  // NARRATIVA LITERÁRIA INTELIGENTE (por modo)
  // ------------------------------------------------------------------
  function gerarNarrativaLiteraria(msg, senderNick, mode) {
    const textoOriginal = msg.text || '';
    const isImage = msg.tipo === 'img';
    const isVideo = msg.tipo === 'vid';

    // Templates por modo
    const templates = {
      ROMANCE: {
        texto: (txt) => `"${txt}" — sussurrou ${senderNick} com voz de veludo.`,
        imagem: () => `${senderNick} revelou uma imagem que fez o coração acelerar.`,
        video: () => `${senderNick} enviou um vídeo que dançava como chama.`
      },
      NOIR: {
        texto: (txt) => `— ${txt} — disse ${senderNick}, e o silêncio ficou mais pesado.`,
        imagem: () => `Uma foto apareceu, cheia de sombras e segredos.`,
        video: () => `O vídeo mostrava uma cena que ninguém deveria ver.`
      },
      FANTASIA: {
        texto: (txt) => `As palavras élficas de ${senderNick} ecoaram: "${txt}"`,
        imagem: () => `Uma imagem mágica brilhou na escuridão.`,
        video: () => `Um feitiço em movimento foi conjurado por ${senderNick}.`
      },
      GÓTICO: {
        texto: (txt) => `Um murmúrio frio escapou dos lábios de ${senderNick}: "${txt}"`,
        imagem: () => `A imagem tinha um ar espectral, como se viesse de outro século.`,
        video: () => `O vídeo parecia uma assombração, repetindo-se em loop.`
      },
      COMÉDIA: {
        texto: (txt) => `${senderNick} soltou uma pérola: "${txt}" — e todos riram.`,
        imagem: () => `Uma imagem hilária quebrou o gelo.`,
        video: () => `O vídeo era tão absurdo que merecia palmas.`
      },
      ERÓTICO: {
        texto: (txt) => `"${txt}" — a voz de ${senderNick} era um convite.`,
        imagem: () => `A imagem insinuava mais do que mostrava.`,
        video: () => `O vídeo provocava os sentidos, frame a frame.`
      },
      'FICÇÃO CIENTÍFICA': {
        texto: (txt) => `${senderNick} transmitiu: "${txt}" via link neural.`,
        imagem: () => `Uma imagem hologrática de ${senderNick} surgiu.`,
        video: () => `Dados visuais de ${senderNick} chegaram em frequência desconhecida.`
      },
      DRAMA: {
        texto: (txt) => `Com olhos marejados, ${senderNick} disse: "${txt}"`,
        imagem: () => `A foto capturava um instante de pura emoção.`,
        video: () => `O vídeo era um retrato cru da realidade.`
      }
    };

    const modo = templates[mode] || templates.ROMANCE;
    if (isImage) return modo.imagem();
    if (isVideo) return modo.video();
    return modo.texto(textoOriginal);
  }

  const panel = document.getElementById('typewriterPanel');
  function adicionarNarrativaLiteraria(texto, tipo = 'msg') {
    if (narrativePaused.value) return;
    // Pequeno prefixo visual
    const prefix = tipo === 'system' ? '⚙️ ' : '';
    typeWriterEffect(prefix + texto + '\n');
  }

  function typeWriterEffect(extraText) {
    let i = 0;
    const speed = 40;
    function addChar() {
      if (i < extraText.length && !narrativePaused.value) {
        panel.innerHTML += extraText.charAt(i);
        i++;
        setTimeout(addChar, speed);
      } else if (i < extraText.length && narrativePaused.value) {
        setTimeout(addChar, 100);
      }
    }
    addChar();
    panel.scrollTop = panel.scrollHeight;
  }

  document.getElementById('pauseNarrativa').onclick = () => { narrativePaused.value = !narrativePaused.value; };
  document.getElementById('editarNarrativa').onclick = () => {
    const novo = prompt('Edite a narrativa:', panel.innerText);
    if (novo !== null) panel.innerText = novo;
  };
  document.getElementById('exportarNarrativa').onclick = () => {
    const blob = new Blob([panel.innerText], { type: 'text/plain' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `narrativa_${Date.now()}.txt`;
    a.click();
  };

  // ------------------------------------------------------------------
  // FOFOCA PRIVADA
  // ------------------------------------------------------------------
  document.getElementById('btnFofoca').onclick = () => {
    if (!currentRoomId) return alert('Entre em um chat primeiro');
    // Pega a última mensagem do outro participante
    const msgs = document.querySelectorAll('#messageContainer .message-bubble .msg-text');
    if (msgs.length === 0) return alert('Nenhuma mensagem do outro ainda');
    // Precisamos saber se a última mensagem é do outro
    // Vamos pegar todas as mensagens e achar a última do outro (que não seja a do próprio usuário)
    const bubbles = document.querySelectorAll('#messageContainer .message-bubble');
    let lastOtherMsg = null;
    for (let i = bubbles.length - 1; i >= 0; i--) {
      const infoSpan = bubbles[i].querySelector('.msg-info span');
      if (infoSpan && infoSpan.innerText !== currentUserNick) {
        lastOtherMsg = bubbles[i].querySelector('.msg-text')?.innerText || '';
        break;
      }
    }
    if (!lastOtherMsg) return alert('Nenhuma mensagem do outro encontrada');

    const dica = gerarDicaFofoca(lastOtherMsg);
    mostrarPopupFofoca(dica);
  };

  function gerarDicaFofoca(ultimaMsg) {
    const msg = ultimaMsg.toLowerCase();
    if (msg.includes('?') || msg.includes('pq') || msg.includes('por que')) {
      return "🕵️ Ele(a) está curioso(a). Responda com mistério.";
    } else if (msg.includes('tchau') || msg.includes('xau')) {
      return "🕵️ Parece que quer ir embora. Puxe um assunto novo.";
    } else if (msg.includes('amo') || msg.includes('saudade')) {
      return "🕵️ Tem um tom emocional. Aproveite para se abrir.";
    } else if (msg.length < 10) {
      return "🕵️ Resposta curta. Talvez esteja hesitante. Seja direto.";
    } else {
      return "🕵️ Ele(a) está confortável. Mantenha o ritmo.";
    }
  }

  function mostrarPopupFofoca(texto) {
    const existing = document.querySelector('.popup-fofoca');
    if (existing) existing.remove();

    const div = document.createElement('div');
    div.className = 'popup-fofoca';
    div.innerText = texto;
    document.body.appendChild(div);

    setTimeout(() => {
      if (div.parentNode) div.remove();
    }, 6000);
  }

  // ------------------------------------------------------------------
  // MUDAR MODO (manual e automático)
  // ------------------------------------------------------------------
  document.getElementById('btnMudarModo').onclick = async () => {
    if (!currentRoomId) return;
    // Escolhe um modo aleatório dentre os dinâmicos (ou todos?)
    const novoModo = DYNAMIC_MODES[Math.floor(Math.random() * DYNAMIC_MODES.length)];
    await db.ref(`rooms/${currentRoomId}/metadata`).update({
      currentMode: novoModo,
      lastModeChange: Date.now()
    });
  };

  function iniciarRotacaoAutomatica(roomId) {
    setInterval(async () => {
      // A cada 10 minutos, muda para um modo dinâmico aleatório
      const novoModo = DYNAMIC_MODES[Math.floor(Math.random() * DYNAMIC_MODES.length)];
      await db.ref(`rooms/${roomId}/metadata`).update({
        currentMode: novoModo,
        lastModeChange: Date.now()
      });
      // Notificação via narrativa
      adicionarNarrativaLiteraria(`🔄 Rotação automática: novo modo ${novoModo}`, 'system');
    }, 600000); // 10 minutos
  }

  // ------------------------------------------------------------------
  // POP-UPS DE INCENTIVO (30s inatividade)
  // ------------------------------------------------------------------
  function iniciarMonitorInatividade() {
    if (popupInterval) clearInterval(popupInterval);
    popupInterval = setInterval(() => {
      const agora = Date.now();
      if (agora - lastMessageTime > 30000 && currentRoomId) {
        const msgs = document.querySelectorAll('#messageContainer .message-bubble .msg-text');
        const ultimoTexto = msgs.length > 0 ? msgs[msgs.length-1].innerText : '';
        const popup = gerarPopupContextual(ultimoTexto);
        mostrarPopupIncentivo(popup);
      }
    }, 15000);
  }

  function gerarPopupContextual(ultimaMsg) {
    ultimaMsg = ultimaMsg.toLowerCase();
    if (ultimaMsg.includes('amor') || ultimaMsg.includes('saudade')) {
      return { texto: "💜 Talvez seja hora de revelar seus sentimentos...", cor: '#7B4B9E' };
    } else if (ultimaMsg.includes('tchau') || ultimaMsg.includes('fim')) {
      return { texto: "🔥 Final épico detectado! Sugestão: 'Nos vemos nas estrelas'", cor: '#E63946' };
    } else {
      return { texto: "💬 O silêncio fala alto... Que tal uma pergunta?", cor: '#4A4A4A' };
    }
  }

  function mostrarPopupIncentivo(popup) {
    const div = document.createElement('div');
    div.className = 'popup-inteligente';
    div.style.background = `linear-gradient(135deg, ${popup.cor} 0%, rgba(28,28,28,0.95) 100%)`;
    div.innerText = popup.texto;
    document.body.appendChild(div);
    setTimeout(() => div.remove(), 7000);
  }

  // ------------------------------------------------------------------
  // INICIALIZAÇÃO
  // ------------------------------------------------------------------
  auth.onAuthStateChanged(async (user) => {
    if (user) {
      currentUser = user;
      currentUserNick = user.displayName || 'anon';
      if (window.location.search.includes('room=')) {
        await handleInvitedLink();
      } else {
        if (!user.displayName) { showLogin(); return; }
        if (user.displayName === 'sigilo') {
          updateUILoggedIn();
          renderPersonagemForm();
        }
      }
    } else {
      showLogin();
    }
  });
</script>
</body>
</html>
